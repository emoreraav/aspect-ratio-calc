<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResoMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        
        /* Aseguramos que el contenedor tenga un tamaño fijo para el cálculo */
        #previewContainer {
            width: 100%;
            height: 200px;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #1a1a1a;
            border-radius: 1rem;
            overflow: hidden;
        }

        #previewBox {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .card { background: #0f0f0f; border: 1px solid #1a1a1a; }
        input, select { background: transparent; outline: none; color: white; width: 100%; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#0a0a0a] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-[#1a1a1a]">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-tighter italic uppercase">ResoMaster Pro</h1>
            <p class="text-gray-600 text-[10px] uppercase tracking-widest font-bold">Manual Engine</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="card p-4 rounded-xl">
                <label class="block text-[9px] text-gray-500 uppercase mb-1">Width</label>
                <input type="number" id="width" value="1920">
            </div>
            <div class="card p-4 rounded-xl">
                <label class="block text-[9px] text-gray-500 uppercase mb-1">Height</label>
                <input type="number" id="height" value="1080">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="card p-3 rounded-xl">
                <label class="block text-[8px] text-gray-500 uppercase mb-1">Hz</label>
                <select id="hz">
                    <option value="24">24</option>
                    <option value="30">30</option>
                    <option value="60" selected>60</option>
                    <option value="120">120</option>
                </select>
            </div>
            <div class="card p-3 rounded-xl">
                <label class="block text-[8px] text-gray-500 uppercase mb-1">Bits</label>
                <select id="bits">
                    <option value="8" selected>8-bit</option>
                    <option value="10">10-bit</option>
                </select>
            </div>
            <div class="card p-3 rounded-xl">
                <label class="block text-[8px] text-gray-500 uppercase mb-1">Color</label>
                <select id="colorspace">
                    <option value="rec709" selected>709</option>
                    <option value="rec2020">2020</option>
                </select>
            </div>
        </div>

        <div class="card p-4 rounded-xl mb-6 text-center">
            <label class="block text-[9px] text-gray-500 uppercase mb-1">Aspect Ratio</label>
            <div class="flex justify-center font-bold text-xl">
                <input type="number" id="ratioW" class="text-right w-12" placeholder="16">
                <span class="mx-2 text-gray-700">:</span>
                <input type="number" id="ratioH" class="text-left w-12" placeholder="9">
            </div>
        </div>

        <div id="previewContainer" class="mb-6">
            <div id="previewBox">
                <span id="previewText" class="text-[9px] font-mono font-bold bg-black/50 px-1"></span>
            </div>
        </div>

        <div class="p-4 bg-white/5 rounded-xl border border-white/10 text-center">
            <p class="text-[8px] text-gray-500 uppercase mb-1">Required Cable</p>
            <div id="cableInfo" class="text-xs font-bold italic">---</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
