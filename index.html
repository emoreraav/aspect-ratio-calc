<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResoMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #previewContainer {
            perspective: 1000px;
        }
        #previewBox {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(59, 130, 246, 0.8);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#1e293b] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-800">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-blue-400 italic">RESOMASTER PRO</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">Calculadora de Resolución</p>
        </header>

        <div class="mb-6">
            <select id="preset" class="w-full p-4 rounded-2xl bg-[#0f172a] border border-slate-700 outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500 transition-all">
                <option value="custom">⚙️ Personalizado (Libre)</option>
                <option value="1280x720">HD (720p)</option>
                <option value="1920x1080" selected>Full HD (1080p)</option>
                <option value="2560x1440">QHD (2K)</option>
                <option value="3840x2160">UHD (4K)</option>
                <option value="1080x1920">Vertical (TikTok/Mobile)</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-[#0f172a] p-4 rounded-2xl border border-slate-800">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Ancho</label>
                <input type="number" id="width" class="w-full bg-transparent text-xl font-bold text-blue-400 outline-none opacity-50" value="1920" readonly>
            </div>
            <div class="bg-[#0f172a] p-4 rounded-2xl border border-slate-800">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Alto</label>
                <input type="number" id="height" class="w-full bg-transparent text-xl font-bold text-blue-400 outline-none opacity-50" value="1080" readonly>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-[#0f172a] p-4 rounded-2xl border border-slate-800">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Refresco</label>
                <select id="hz" class="w-full bg-transparent text-lg font-bold outline-none opacity-50" disabled>
                    <option value="24">24 Hz</option>
                    <option value="30">30 Hz</option>
                    <option value="60" selected>60 Hz</option>
                    <option value="120">120 Hz</option>
                    <option value="240">240 Hz</option>
                </select>
            </div>
            <div class="bg-[#0f172a] p-4 rounded-2xl border border-slate-800">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Aspect Ratio</label>
                <div class="flex items-center text-emerald-400 text-xl font-bold">
                    <input type="number" id="ratioW" class="w-full bg-transparent outline-none text-center" placeholder="16">
                    <span class="px-1 text-slate-700">:</span>
                    <input type="number" id="ratioH" class="w-full bg-transparent outline-none text-center" placeholder="9">
                </div>
            </div>
        </div>

        <div class="mb-8 h-48 bg-black rounded-[1.5rem] border border-slate-800 flex items-center justify-center p-6 overflow-hidden" id="previewContainer">
            <div id="previewBox">
                <span id="previewText" class="text-[10px] font-mono text-blue-300 font-bold whitespace-nowrap"></span>
            </div>
        </div>

        <div class="p-5 bg-blue-500/5 rounded-3xl border border-blue-500/20 shadow-inner">
            <p class="text-[10px] text-blue-500 font-black uppercase mb-1 tracking-widest">Conectividad Mínima</p>
            <div id="cableInfo" class="text-lg font-bold text-slate-100 italic tracking-tight">---</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
