<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResoMaster Pro | Manual Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
        }
        
        #previewBox {
            transition: all 0.3s ease-out;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .input-card {
            background-color: #111111;
            border: 1px solid #222222;
            transition: border-color 0.2s;
        }

        .input-card:focus-within {
            border-color: #444444;
        }

        select option { background: #111; color: white; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#0A0A0A] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-[#1A1A1A]">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">RESOMASTER PRO</h1>
            <p class="text-gray-600 text-[10px] uppercase tracking-[0.3em] font-bold">Manual Resolution Engine</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="input-card p-4 rounded-xl">
                <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1 px-1">Width (px)</label>
                <input type="number" id="width" class="w-full bg-transparent text-xl font-bold outline-none text-white" value="1920">
            </div>
            <div class="input-card p-4 rounded-xl">
                <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1 px-1">Height (px)</label>
                <input type="number" id="height" class="w-full bg-transparent text-xl font-bold outline-none text-white" value="1080">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="input-card p-3 rounded-xl text-center">
                <label class="block text-[8px] font-bold text-gray-500 uppercase mb-1">Refresh</label>
                <select id="hz" class="w-full bg-transparent text-xs font-bold outline-none text-center">
                    <option value="23.976">23.976</option>
                    <option value="24">24 Hz</option>
                    <option value="25">25 Hz</option>
                    <option value="29.97">29.97</option>
                    <option value="30">30 Hz</option>
                    <option value="50">50 Hz</option>
                    <option value="60" selected>60 Hz</option>
                    <option value="120">120 Hz</option>
                </select>
            </div>
            <div class="input-card p-3 rounded-xl text-center">
                <label class="block text-[8px] font-bold text-gray-500 uppercase mb-1">Depth</label>
                <select id="bits" class="w-full bg-transparent text-xs font-bold outline-none text-center">
                    <option value="8" selected>8-bit</option>
                    <option value="10">10-bit</option>
                    <option value="12">12-bit</option>
                </select>
            </div>
            <div class="input-card p-3 rounded-xl text-center">
                <label class="block text-[8px] font-bold text-gray-500 uppercase mb-1">Color</label>
                <select id="colorspace" class="w-full bg-transparent text-[10px] font-bold outline-none text-center">
                    <option value="rec709" selected>Rec.709</option>
                    <option value="p3">DCI-P3</option>
                    <option value="rec2020">Rec.2020</option>
                </select>
            </div>
        </div>

        <div class="input-card p-4 rounded-xl mb-8">
            <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1 text-center">Aspect Ratio</label>
            <div class="flex items-center text-white font-black justify-center text-xl">
                <input type="number" id="ratioW" class="w-12 bg-transparent outline-none text-right" placeholder="16">
                <span class="px-2 text-gray-800">:</span>
                <input type="number" id="ratioH" class="w-12 bg-transparent outline-none text-left" placeholder="9">
            </div>
        </div>

        <div class="mb-8 h-48 bg-black rounded-2xl border border-[#1A1A1A] flex items-center justify-center p-4 overflow-hidden" id="previewContainer">
            <div id="previewBox">
                <span id="previewText" class="text-[9px] font-mono text-white font-bold whitespace-nowrap bg-black/40 px-1"></span>
            </div>
        </div>

        <div class="p-5 bg-white/[0.03] rounded-2xl border border-[#1A1A1A]">
            <p class="text-[9px] text-gray-600 font-black uppercase mb-1 tracking-widest text-center">Minimum Connectivity</p>
            <div id="cableInfo" class="text-sm font-bold text-white text-center italic tracking-tight">---</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
