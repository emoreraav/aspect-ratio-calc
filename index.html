<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolución & Cable Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
        <h1 class="text-3xl font-extrabold mb-6 text-center bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">ResoMaster Pro</h1>
        
        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Perfil de Resolución</label>
            <select id="preset" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <option value="custom">⚙️ Personalizado (Desbloqueado)</option>
                <option value="1280x720">HD (720p)</option>
                <option value="1920x1080">Full HD (1080p)</option>
                <option value="2560x1440">QHD (2K)</option>
                <option value="3840x2160">UHD (4K)</option>
                <option value="7680x4320">FUHD (8K)</option>
                <option value="1080x1920">Instagram Stories / TikTok</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs text-slate-400 mb-1">Ancho (px)</label>
                <input type="number" id="width" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none font-mono" placeholder="1920">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1">Alto (px)</label>
                <input type="number" id="height" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none font-mono" placeholder="1080">
            </div>
        </div>

        <div class="mb-8 p-4 bg-slate-900/50 rounded-xl border border-slate-700">
            <label class="block text-xs font-bold text-slate-400 mb-3 text-center uppercase">Aspect Ratio</label>
            <div class="flex justify-center items-center gap-4">
                <input type="number" id="ratioW" class="w-20 p-2 rounded bg-slate-800 border border-slate-600 text-center" placeholder="16">
                <span class="text-xl font-bold text-blue-500">:</span>
                <input type="number" id="ratioH" class="w-20 p-2 rounded bg-slate-800 border border-slate-600 text-center" placeholder="9">
            </div>
            <div id="resultRatio" class="text-center mt-3 text-sm font-medium text-emerald-400">Ratio detectado: 16:9</div>
        </div>

        <div class="p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl text-center">
            <p class="text-xs text-blue-300 uppercase font-bold mb-1">Conectividad Recomendada (@60Hz)</p>
            <div id="cableInfo" class="text-lg font-semibold text-white italic">Detectando cable...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
