<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResoMaster Pro | Ultimate Broadcast Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #previewContainer { perspective: 1000px; }
        #previewBox {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(59, 130, 246, 0.05);
            border: 2px solid rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        select { cursor: pointer; transition: all 0.2s; }
        select:hover:not(:disabled) { background-color: #1e293b; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#161e2d] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-800">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black tracking-tighter text-blue-400 italic">RESOMASTER PRO</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold italic">Professional Video Standards</p>
        </header>

        <div class="mb-4">
            <select id="preset" class="w-full p-4 rounded-2xl bg-[#0b0f1a] border border-slate-700 outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500 transition-all">
                <option value="custom">⚙️ Custom (Unlocked)</option>
                <option value="1280x720">HD (720p)</option>
                <option value="1920x1080" selected>Full HD (1080p)</option>
                <option value="2560x1440">QHD (2K)</option>
                <option value="3840x2160">UHD (4K)</option>
                <option value="7680x4320">FUHD (8K)</option>
                <option value="1080x1920">Vertical (Social Media)</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Width</label>
                <input type="number" id="width" class="w-full bg-transparent text-xl font-bold text-blue-400 outline-none" value="1920" readonly style="opacity: 0.5;">
            </div>
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Height</label>
                <input type="number" id="height" class="w-full bg-transparent text-xl font-bold text-blue-400 outline-none" value="1080" readonly style="opacity: 0.5;">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Refresh Rate</label>
                <select id="hz" class="w-full bg-transparent text-sm font-bold outline-none" disabled style="opacity: 0.5;">
                    <option value="23.976">23.976 fps</option>
                    <option value="24">24 Hz</option>
                    <option value="25">25 Hz (PAL)</option>
                    <option value="29.97">29.97 Hz (NTSC)</option>
                    <option value="30">30 Hz</option>
                    <option value="50">50 Hz</option>
                    <option value="60" selected>60 Hz</option>
                    <option value="120">120 Hz</option>
                </select>
            </div>
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Bit Depth</label>
                <select id="bits" class="w-full bg-transparent text-sm font-bold outline-none" disabled style="opacity: 0.5;">
                    <option value="8" selected>8-bit (SDR)</option>
                    <option value="10">10-bit (HDR)</option>
                    <option value="12">12-bit (Dolby)</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Color Space</label>
                <select id="colorspace" class="w-full bg-transparent text-[11px] font-bold outline-none" disabled style="opacity: 0.5;">
                    <option value="rec709" selected>Rec. 709 (HD)</option>
                    <option value="p3">DCI-P3 (Cinema)</option>
                    <option value="rec2020">Rec. 2020 (UHD)</option>
                </select>
            </div>
            <div class="bg-[#0b0f1a] p-3 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Aspect Ratio</label>
                <div class="flex items-center text-emerald-400 font-bold justify-center text-sm">
                    <input type="number" id="ratioW" class="w-8 bg-transparent outline-none text-right" placeholder="16">
                    <span class="px-1 text-slate-700">:</span>
                    <input type="number" id="ratioH" class="w-8 bg-transparent outline-none text-left" placeholder="9">
                </div>
            </div>
        </div>

        <div class="mb-6 h-40 bg-[#070a13] rounded-[1.5rem] border border-slate-800 flex items-center justify-center p-4 overflow-hidden" id="previewContainer">
            <div id="previewBox">
                <span id="previewText" class="text-[9px] font-mono text-blue-400 font-bold whitespace-nowrap drop-shadow-md"></span>
            </div>
        </div>

        <div class="p-4 bg-blue-500/5 rounded-2xl border border-blue-500/20">
            <p class="text-[9px] text-blue-500 font-black uppercase mb-1 tracking-widest">Suggested Connectivity</p>
            <div id="cableInfo" class="text-sm font-bold text-slate-100 italic tracking-tight">---</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
